name: Sample audit

# Monthly sampling audit: files an issue with a deterministic 8-entry human
# review checklist (see scripts/sample-audit.mjs). Selection is offline and
# seeded by the audit month, so a rerun within the month yields the same
# sample. Never runs in PR CI; never blocks contributors. Findings fix via
# normal PRs referencing the issue; the closing comment records X findings /
# M cells sampled — that series is the catalog's measured error rate.
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - id: month
        run: echo "ym=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"
      - run: node scripts/sample-audit.mjs > audit.md
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue create --title "Monthly accuracy audit, ${{ steps.month.outputs.ym }}" --label audit --body-file audit.md || true
