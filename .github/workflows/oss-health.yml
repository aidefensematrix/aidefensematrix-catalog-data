name: OSS project health

# Weekly, read-only check that the GitHub repositories cited by open-source entries
# still exist at the cited org/repo, are not archived, and show recent activity.
# Never runs in PR CI (keeps contributor builds offline). Opens an issue when a
# repository needs a human look; tolerant of API outages and rate limits.
on:
  schedule:
    - cron: '0 7 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - id: health
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-oss-health.mjs
      - if: steps.health.outputs.health != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.health.outputs.health }}
        run: gh issue create --title "OSS project health" --body "$BODY" || true
