name: Quote check

# Weekly check that every source.quote still appears on the page its source.url
# cites (normalized substring match). SSRF-guarded, manual redirects. Never runs
# in PR CI. A mismatch means the quote needs human re-verification — the page may
# have changed since the accessed date (re-quote and bump it) or the quote may
# never have been present. Opens an issue; never blocks contributors.
on:
  schedule:
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - id: quotes
        run: node scripts/check-quotes.mjs
      - if: steps.quotes.outputs.mismatches != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.quotes.outputs.mismatches }}
        run: gh issue create --title "Quote mismatches detected in catalog" --body "$BODY" || true
