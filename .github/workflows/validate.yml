name: Validate

# PR + push CI for community data contributions. Fork-safe: read-only token, no
# secrets, and no network access — the validator never reaches out, so a malicious PR
# cannot exfiltrate or write. Changes are subject to maintainer review before merge.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run validate
      - run: pnpm run check:typography

  dco:
    # Every commit must carry a Developer Certificate of Origin sign-off, the
    # inbound=outbound CC BY-NC 4.0 license signal (see CONTRIBUTING.md).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: DCO sign-off check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for c in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git log -1 --format=%B "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $c is missing a Signed-off-by line (use git commit -s)"
              missing=1
            fi
          done
          exit $missing
