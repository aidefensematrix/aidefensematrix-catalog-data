name: Matrix ID drift

# Weekly, read-only check that the vendored matrix ids still match the companion's
# PUBLISHED artifact. Never runs in PR CI (keeps contributor builds offline). Opens
# an issue on drift; tolerant if the companion site is unreachable.
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - id: drift
        run: node scripts/check-matrix-drift.mjs
      - if: steps.drift.outputs.drift != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ steps.drift.outputs.drift }}
        run: gh issue create --title "Matrix ID drift detected" --body "$BODY" || true
