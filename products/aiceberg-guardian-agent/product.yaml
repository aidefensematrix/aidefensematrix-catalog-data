    functions: [detect]
    maturity: secondary
    note: Monitors agentic AI decisions and actions, including information an agent pulls via RAG, tool use, and memory, with explainable and traceable risk detection across connected AI systems.
    source: { url: https://www.aiceberg.ai/, tier: official, title: Aiceberg, accessed: 2026-07-16, origin: agent, quote: "Identify exposure of sensitive information whenever an agent pulls information via RAG, Tool use, Memory, etc.." }
