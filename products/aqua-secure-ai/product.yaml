    source: { url: https://www.aquasec.com/news/full-lifecycle-security-for-ai-applications/, tier: official, title: Aqua Secure AI launch press release, accessed: 2026-06-10, origin: reviewed, quote: "This latest enhancement builds on that foundation, making the Aqua Platform the only cloud native security solution offering full lifecycle protection for AI workloads from code commit to runtime." }
