    source: { url: https://www.surepath.ai/, tier: official, title: SurePath AI homepage, accessed: 2026-07-05, origin: agent, quote: "Detect and redact sensitive info, ensuring secure, user-friendly outputs." }
  - asset: ai-gateways-routers
    functions: [identify, protect]
    maturity: secondary
    note: Captures AI traffic at the network level without endpoint agents to reveal which AI services are in use, and enforces role- and group-based access policies controlling which models, tools, and data each user can reach.
