matrix_coverage:
  - asset: ai-agent-identities
    functions: [identify, protect]
    maturity: primary
    note: Assigns machine identities to AI agents and enforces per-agent authorization and consent over their access to tools and resources, with humans delegating bounded authority.
    source: { url: https://www.permit.io/ai-access-control, tier: official, title: Permit.io AI Access Control page, accessed: 2026-06-24, origin: reviewed, quote: "Assign machine identities to AI agents to track and manage their access to external tools and resources." }
  - asset: ai-orchestration-tools
    functions: [protect, detect]
    maturity: secondary
    note: An MCP gateway proxy authorizes every agent tool call against fine-grained policy, blocks denied calls before they reach the server, and logs each decision.
    source: { url: https://docs.permit.io/permit-mcp-gateway/overview, tier: official, title: Permit MCP Gateway overview, accessed: 2026-06-24, origin: reviewed, quote: "every tool call is checked against policy; denied calls are blocked before reaching the upstream server" }
  - asset: runtime-ai-data
    functions: [protect]
    maturity: secondary
    note: Applies attribute-based access control to RAG queries with pre-query and post-query filtering to prevent unauthorized AI access to retrieved data.
    source: { url: https://www.permit.io/ai-access-control, tier: official, title: Permit.io AI Access Control page, accessed: 2026-06-24, origin: reviewed, quote: "Prevent unauthorized AI data access by applying attribute-based access control (ABAC) on RAG queries." }
primary_cell: { asset: ai-agent-identities, function: protect }
