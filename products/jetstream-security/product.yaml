matrix_coverage:
  - asset: ai-orchestration-tools
    functions: [govern, identify, protect, detect]
    maturity: primary
    note: AI Blueprints define the approved models, tools, identities, and guardrails for each workflow as versioned operational contracts; discovery inventories agents, MCP servers, and AI-enabled apps, and runtime drift from the approved design is flagged for approval or shutdown.
    source: { url: https://jetstream.security/platform/, tier: official, title: Security-First AI Governance Platform, accessed: 2026-07-24, origin: agent, quote: "An AI Blueprint™ is a living operational contract that defines approved models, tools, identities, guardrails, and ownership for an AI workflow." }
  - asset: ai-agent-identities
    functions: [govern, detect, protect, identify, respond]
    maturity: primary
    note: The Identity Broker binds agents, service accounts, and non-human identities to accountable human owners and replaces raw model-provider secrets with scoped, revocable virtual keys that carry least-privilege authorization across agent hand-offs.
    source: { url: https://jetstream.security/platform/, tier: official, title: Security-First AI Governance Platform, accessed: 2026-07-24, origin: agent, quote: "JetStream binds agents, service accounts, and model usage to a provable human owner through the Identity Broker™, ensuring every AI action is attributable and revocable." }
  - asset: ai-model
    functions: [protect, detect, identify, govern]
    maturity: primary
    note: Discovers and inventories models across the environment, enforces Blueprint-scoped models at runtime, prevents unapproved model substitutions, and detects drift from the approved design.
    source: { url: https://jetstream.security/platform/, tier: official, title: Security-First AI Governance Platform, accessed: 2026-07-24, origin: agent, quote: "JetStream enforces Blueprint-scoped models, identity delegation chains, and key controls in real time" }
- asset: ai-gateways-routers
    functions: [govern, protect, detect, identify, respond]
    maturity: primary
    note: AI Hub provides a centralized gateway which introduces model control, mcp access, authentication, and control, inference escrow, and inline guardrails for AI usage in the cloud and on endpoints.
    source: { url: https://jetstream.security/insights/jetstream-verified-mcp-governance-layer-for-enterprise-ai-agents/, tier: official, title: Security-First AI Governance Platform, accessed: 2026-07-24, origin: agent, quote: "The JetStream AI Hub governs runtime. It gives enterprises a unified control point over MCP and large language model traffic, including authentication, authorization, policy enforcement, and content inspection before and after each call." }
- asset: runtime-ai-data
    functions: [protect, detect, identify, govern]
    maturity: primary
    note: Runtime governance analyzes and inspects AI inference and activity in real time and controls what AI is actually doing in production, not just what it was designed to do
    source: { url: https://jetstream.security/platform, tier: official, title: Security-First AI Governance Platform, accessed: 2026-07-24, origin: agent, quote: "JetStream watches live AI activity and compares that to the approved design" }
