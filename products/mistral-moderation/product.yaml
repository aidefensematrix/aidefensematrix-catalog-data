matrix_coverage:
  - asset: runtime-ai-data
    functions: [protect, detect]
    maturity: primary
    note: The moderation service classifies raw text and conversational content across policy categories including jailbreaking, while custom guardrails declared in chat completions and conversations requests enforce per-category thresholds and block violating content with a 403 response.
    source: { url: https://docs.mistral.ai/capabilities/guardrailing/, tier: official, title: Mistral AI moderation and guardrailing documentation, accessed: 2026-06-10, origin: reviewed, quote: "When a guardrail is triggered, the request is blocked and a 403 error is returned." }
  - asset: ai-orchestration-tools
    functions: [protect, detect]
    maturity: secondary
    note: Agent-level guardrails attach moderation rules to an agent at creation time, and all conversations using that agent automatically inherit the configured thresholds and blocking action.
    source: { url: https://docs.mistral.ai/capabilities/guardrailing/, tier: official, title: Mistral AI moderation and guardrailing documentation, accessed: 2026-06-10, origin: reviewed, quote: "Custom guardrails let you declare moderation rules directly in your API requests, without manually calling the Moderation API and implementing threshold logic in your application code." }
primary_cell: { asset: runtime-ai-data, function: protect }
