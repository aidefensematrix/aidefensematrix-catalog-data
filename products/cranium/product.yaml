    functions: [identify, detect]
    maturity: secondary
    note: CloudSensor integrates with cloud environments to discover security alerts, monitor unauthorized changes, and assess role-based access controls; Detect AI scans internal environments for shadow AI.
    source: { url: https://cranium.ai/platform/discover/, tier: official, title: Cranium Discover page, accessed: 2026-07-17, origin: agent, quote: "monitors cloud changes, alerts and access controls" }
  - asset: ai-agent-identities
    functions: [identify]
    maturity: secondary
    note: AgentSensor gives visibility into the agentic layer, automatically detecting AI agents, the tools they invoke, and other agents in the network.
    source: { url: https://cranium.ai/platform/discover/, tier: official, title: Cranium Discover page, accessed: 2026-07-17, origin: agent, quote: "maps agents, the tools they invoke, and the agents they reach" }
