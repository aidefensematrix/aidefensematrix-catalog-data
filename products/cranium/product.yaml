    note: Sensors discover internal and third-party AI systems; the platform auto-generates AI BOMs, runs agent-based red teaming via Cranium Arena, and maps systems to the EU AI Act, NIST AI RMF, and ISO frameworks.
    source: { url: https://cranium.ai/platform/discover/, tier: official, title: Cranium Discover page, accessed: 2026-07-17, origin: agent, quote: "scans source code for models, datasets and AI packages" }
