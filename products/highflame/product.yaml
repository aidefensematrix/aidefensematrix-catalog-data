matrix_coverage:
  - asset: ai-gateways-routers
    functions: [protect]
    maturity: primary
    note: Acts as a centralized control layer across LLM, MCP, A2A, and A2P interactions, enforcing Cedar-based access, safety, and compliance policies inline and generating audit-ready reports.
    source: { url: https://www.highflame.com/platform, tier: official, title: Highflame Agent Gateway, accessed: 2026-07-05, origin: agent, quote: "The Highflame Agent Gateway is the data plane that enforces every decision: a Rust gateway for LLM, MCP, and A2A traffic that binds each request to a verifiable agent identity at the wire." }
  - asset: runtime-ai-data
    functions: [protect, detect]
    maturity: primary
    note: Inline controls inspect prompts and responses and block malicious inputs such as prompt injection, and strip PII and secrets before they reach the model or any tool.
    source: { url: https://www.highflame.com/platform, tier: official, title: Highflame platform runtime controls, accessed: 2026-07-05, origin: agent, quote: "Blocking an injection and pausing a drifting agent are the same kind of decision." }
  - asset: ai-orchestration-tools
    functions: [protect, detect]
    maturity: primary
    note: Enforces one Cedar policy across MCP, tool-gateway, and agent-to-agent traffic, and its signal engine flags tool-risk and MCP poisoning inline.
    source: { url: https://www.highflame.com/platform, tier: official, title: Highflame platform signal engine, accessed: 2026-07-05, origin: agent, quote: "150+ prebuilt detectors emit hundreds of typed signals per run (across prompts, tool calls, and responses), mapped to one taxonomy and fed to the policy." }
  - asset: ai-agent-identities
    functions: [identify, protect, detect]
    maturity: primary
    note: Discovers agents across the environment and issues each a verifiable, scoped, just-in-time credential with cascade revocation, then risk-scores every agent identity and monitors for mission drift.
    source: { url: https://www.highflame.com/platform, tier: official, title: Highflame Agent Identity, accessed: 2026-07-05, origin: agent, quote: "Highflame provides both by enforcing identity, authority, delegation, and revocation at every boundary, in real time." }
primary_cell: { asset: ai-agent-identities, function: protect }
