changelog:
  - date: 2026-06-10
    summary: Added to the catalog from the Databricks documentation. Formerly documented as Mosaic AI Gateway; AI Guardrails are in public preview and the redesigned gateway experience is in beta.
  - date: 2026-06-12
    summary: Refined matrix coverage and primary function.
  - date: 2026-06-14
    summary: Refreshed description and added MCP-server coverage; product is in beta.
matrix_coverage:
  - asset: ai-gateways-routers
    functions: [protect, detect]
    maturity: primary
    note: Manages and monitors access to model serving endpoints with permissions, rate limits, usage tracking through system tables, fallbacks, and traffic splitting across model backends.
    source: { url: https://docs.databricks.com/aws/en/ai-gateway/overview-serving-endpoints, tier: official, title: Unity AI Gateway serving endpoints documentation, accessed: 2026-06-10, origin: reviewed, quote: "Unity AI Gateway for serving endpoints, which governs and monitors access to supported generative AI models and their associated model-serving endpoints." }
  - asset: runtime-ai-data
    functions: [protect, detect]
    maturity: secondary
    note: AI Guardrails enforce safety filtering against harmful content and block or mask PII detected in endpoint requests and responses, with inference tables logging payloads for audit.
    source: { url: https://docs.databricks.com/aws/en/ai-gateway/configure-ai-gateway-endpoints, tier: official, title: Unity AI Gateway endpoint configuration documentation, accessed: 2026-06-10, origin: reviewed, quote: "Guardrails prevent the model from interacting with unsafe and harmful content that is detected in model inputs and outputs." }
  - asset: ai-orchestration-tools
    functions: [identify, protect, detect]
    maturity: secondary
    note: Governs MCP servers as the enterprise control plane, with centralized view and management of all MCP servers, access control through Unity Catalog permissions and managed-OAuth credentials, and activity monitoring across servers.
    source: { url: https://docs.databricks.com/aws/en/generative-ai/agent-framework/mcp, tier: official, title: Model Context Protocol (MCP) on Databricks, accessed: 2026-06-14, origin: reviewed, quote: "MCP servers are governed through Unity AI Gateway, the enterprise control plane that governs access and monitors activity across MCP servers and LLM endpoints." }
primary_cell: { asset: ai-gateways-routers, function: protect }
