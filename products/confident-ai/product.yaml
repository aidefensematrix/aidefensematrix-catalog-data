matrix_coverage:
  - asset: runtime-ai-data
    functions: [detect, protect]
    maturity: primary
    note: DeepTeam guardrails evaluate LLM system inputs and outputs for malicious intent and unsafe behavior, with input guards blocking malicious prompts before they reach the model and output guards stopping unsafe responses before they reach users, covering prompt injection and toxicity.
    source: { url: https://www.trydeepteam.com/docs/guardrails-introduction, tier: official, title: DeepTeam guardrails introduction, accessed: 2026-06-10, origin: reviewed, quote: "deepteam 's comprehensive suite of guardrails acts as binary metrics to evaluate end-to-end LLM system inputs and output for malicious intent, unsafe behavior, and security vulnerabilities." }
  - asset: ai-model
    functions: [detect]
    maturity: primary
    note: DeepTeam red teaming simulates jailbreaking, prompt injection, and multi-turn exploitation attacks to uncover model vulnerabilities such as bias, PII leakage, and prompt leakage, drawing on more than 50 vulnerability types.
    source: { url: https://github.com/confident-ai/deepteam, tier: official, title: DeepTeam repository on GitHub, accessed: 2026-06-10, origin: reviewed, quote: "DeepTeam is a framework to red team LLMs and AI agents." }
  - asset: ai-orchestration-tools
    functions: [detect]
    maturity: secondary
    note: Red teaming extends to AI agents, RAG pipelines, and chatbots, probing agentic vulnerabilities such as goal theft, recursive hijacking, excessive agency, and tool orchestration abuse.
    source: { url: https://github.com/confident-ai/deepteam, tier: official, title: DeepTeam repository on GitHub, accessed: 2026-06-10, origin: reviewed, quote: "DeepTeam is a framework to red team LLMs and AI agents." }
primary_cell: { asset: runtime-ai-data, function: detect }
