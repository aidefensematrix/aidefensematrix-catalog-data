matrix_coverage:
  - asset: runtime-ai-data
    functions: [detect]
    maturity: primary
    note: Monitors deployed LLM applications in production by sampling interactions and tracking annotation trends and property scores to detect degradation automatically. Scoring is offline evaluation with no documented inline blocking.
    source: { url: https://llmdocs.deepchecks.com/docs/set-up-production-monitoring, tier: official, title: Deepchecks production monitoring documentation, accessed: 2026-06-10, origin: reviewed }
  - asset: ai-model
    functions: [detect]
    maturity: secondary
    note: The pentest environment generates curated adversarial prompts covering prompt injection, jailbreaks, PII extraction, and bias triggers, runs the LLM pipeline against them, and scores whether the attacks succeeded.
    source: { url: https://llmdocs.deepchecks.com/docs/pentesting-your-llm-pipeline, tier: official, title: Deepchecks LLM pentesting documentation, accessed: 2026-06-10, origin: reviewed }
  - asset: ai-orchestration-tools
    functions: [detect]
    maturity: secondary
    note: Evaluates each layer of an agentic pipeline independently, scoring individual agents, tools, and LLM calls to isolate underperforming or failing components.
    source: { url: https://llmdocs.deepchecks.com/docs/agent-evaluation-use-case, tier: official, title: Deepchecks agent evaluation documentation, accessed: 2026-06-10, origin: reviewed }
primary_cell: { asset: runtime-ai-data, function: detect }
