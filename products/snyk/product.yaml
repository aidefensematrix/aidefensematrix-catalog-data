matrix_coverage:
  - asset: ai-generated-code
    functions: [identify, protect]
    maturity: primary
    note: Snyk Studio guides AI coding assistants and Snyk Code scans to find and fix issues in AI-generated code at inception.
    source: { url: https://snyk.io/solutions/secure-at-inception-for-ai/, tier: official, title: Secure at Inception for AI, accessed: 2026-06-08, origin: reviewed, quote: "Snyk Studio integrates directly into AI assistants to proactively guide the AI to produce secure, high-quality code from the start, powered by Snyk Code and Snyk Open Source." }
  - asset: ai-orchestration-tools
    functions: [identify]
    maturity: secondary
    note: Scans MCP servers for vulnerabilities such as tool poisoning, using technology from the Invariant Labs acquisition.
    source: { url: https://snyk.io/news/snyk-acquires-invariant-labs-to-accelerate-agentic-ai-security-innovation/, tier: official, title: Snyk acquires Invariant Labs, accessed: 2026-06-08, origin: reviewed, quote: "The company's unique methods take into account contextual information, static scans of agent tools and implementations, runtime information, human annotations, and incident databases." }
  - asset: ai-agent-identities
    functions: [protect, detect]
    maturity: secondary
    note: Runtime guardrails enforce policy on AI agent behavior, restricting data flow and tool access and flagging anomalous decisions.
    source: { url: https://snyk.io/news/snyk-acquires-invariant-labs-to-accelerate-agentic-ai-security-innovation/, tier: official, title: Snyk acquires Invariant Labs, accessed: 2026-06-08, origin: reviewed, quote: "For example, unauthorized data exfiltration to AI agents executing unintended actions, and threats like MCP vulnerabilities are already appearing in production." }
primary_cell: { asset: ai-generated-code, function: protect }
