matrix_coverage:
  - asset: ai-agent-identities
    functions: [identify, recover]
    maturity: primary
    note: Agent Monitor discovers deployed agents and tracks how they interact with data, identities, and applications. Agent Rewind undoes unwanted or destructive agent actions.
    source: { url: https://www.rubrik.com/products/rubrik-agent-cloud, tier: official, title: Rubrik Agent Cloud product page, accessed: 2026-06-10, origin: reviewed }
  - asset: runtime-ai-data
    functions: [detect, protect]
    maturity: primary
    note: The SAGE engine, unveiled at RSAC 2026, uses a custom small language model to interpret natural language policies, semantically evaluate agent interactions in real time, detect policy violations, and enforce safe boundaries on agent behavior.
    source: { url: https://www.rubrik.com/company/newsroom/press-releases/26/rubrik-rolls-out-industrys-first-semantic-ai-governance-engine, tier: official, title: Rubrik press release on the SAGE governance engine, accessed: 2026-06-10, origin: reviewed }
  - asset: ai-generated-code
    functions: [recover]
    maturity: secondary
    note: Agent Cloud for Claude, generally available as of June 2026, rolls back unintended Claude agent actions and recovers affected code along with the agent configuration, including for Claude Code.
    source: { url: https://siliconangle.com/2026/06/09/rubrik-brings-agent-cloud-claude-launches-rubrik-ai-automate-recovery/, tier: press, title: SiliconANGLE on Rubrik Agent Cloud for Claude, accessed: 2026-06-10, origin: reviewed }
primary_cell: { asset: runtime-ai-data, function: protect }
