  - asset: ai-model
    functions: [detect]
    maturity: primary
    note: TrojAI Detect runs automated red teaming with more than 150 built-in security and safety tests, finding model weaknesses such as prompt injection, data leakage, and PII exposure before deployment.
    source: { url: https://troj.ai/products/detect, tier: official, title: TrojAI Detect product page, accessed: 2026-07-15, origin: agent, quote: "Test AI agents and models to reveal unsafe behavior and security risks." }
  - asset: runtime-ai-data
    functions: [protect, detect]
    maturity: primary
    note: TrojAI Defend is a runtime AI firewall that monitors, alerts, blocks, redacts, and logs, filtering inputs and outputs to AI applications to stop prompt injection, sensitive information disclosure, and other adversarial attacks.
    source: { url: https://troj.ai/products/defend, tier: official, title: TrojAI Defend product page, accessed: 2026-07-05, origin: agent, quote: "TrojAI Defend delivers real-time visibility and control over AI systems, helping you detect, block, and contain threats before they impact users, data, or connected systems." }
  - asset: ai-orchestration-tools
    functions: [protect, detect]
    maturity: primary
    note: TrojAI Defend for MCP applies MCP-specific policies that inspect, audit, and enforce security on MCP traffic in real time, blocking unregistered or rogue servers in agentic workflows.
    source: { url: https://troj.ai/products/defend-mcp, tier: official, title: TrojAI Defend for MCP product page, accessed: 2026-07-05, origin: agent, quote: "TrojAI Defend uses layered AI-driven detections to identify and stop threats in real time across prompts, responses, and agent interactions, delivering complete runtime protection." }
