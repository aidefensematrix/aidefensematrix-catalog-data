matrix_coverage:
  - asset: ai-agent-identities
    functions: [identify, detect, protect]
    maturity: primary
    note: Builds an inventory of agents, copilots, flows, and models with ownership and permission context, profiles each agent to learn its normal behavior, flags off-script activity, and blocks risky agent instructions before they execute.
    source: { url: https://kanopysecurity.com/ai-governance/ai-agents-security/, tier: official, title: Kanopy AI agent security page, accessed: 2026-06-10, origin: reviewed, quote: "Auto-map every copilot, flow, and model in your environment." }
  - asset: runtime-ai-data
    functions: [protect, detect]
    maturity: secondary
    note: Adaptive guardrails monitor agent actions at runtime, detect prompt injection and manipulation attempts, and stop sensitive data from leaving approved paths in real time, with coverage for Microsoft Copilot Studio environments.
    source: { url: https://kanopysecurity.com/ai-governance/adaptive-agents-security/, tier: official, title: Kanopy adaptive agent security page, accessed: 2026-06-10, origin: reviewed, quote: "Real-time protection for agents that move fast, think fast, and occasionally misbehave." }
  - asset: ai-orchestration-tools
    functions: [identify]
    maturity: secondary
    note: Surfaces shadow copilots, unmanaged integrations, and ungoverned agent experiments inside agent-building platforms such as Copilot Studio, and applies access and security policies with audit trails across the agent lifecycle.
    source: { url: https://kanopysecurity.com/solutions/copilot-studio-security/, tier: official, title: Kanopy Copilot Studio security page, accessed: 2026-06-10, origin: reviewed, quote: "Kanopy delivers enterprise-grade Copilot security and strengthens overall posture across all Copilots built in your organization." }
primary_cell: { asset: ai-agent-identities, function: identify }
