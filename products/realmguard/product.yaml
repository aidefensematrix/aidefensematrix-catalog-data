matrix_coverage:
  - asset: ai-model
    functions: [detect]
    maturity: primary
    note: Deep Neural Inspection maps model internals and reads activity during inference, catching drift, manipulation, and silent failures while they are still inside the inference loop rather than judging output strings after the fact.
    source: { url: https://www.realmlabs.ai/realmguard, tier: official, title: Realm Labs Realmguard, accessed: 2026-07-05, origin: agent, quote: "Realmguard is powered by DNI which reads AI internal thinking and builds patterns on them." }
  - asset: runtime-ai-data
    functions: [detect]
    maturity: primary
    note: Prism observes every production model call and flags failures that emerge from model reasoning, including hallucination, deception, policy drift, jailbreak success, and prompt injection attempts that input and output filters miss.
    source: { url: https://www.realmlabs.ai/security-grc, tier: official, title: Realm Labs security and GRC, accessed: 2026-06-10, origin: reviewed, quote: "Realm gives you runtime visibility, real-time enforcement, and the audit-grade evidence your board and your regulators ask for." }
primary_cell: { asset: ai-model, function: detect }
