  - asset: ai-model
    functions: [identify]
    maturity: secondary
    note: Detects shadow AI usage and unapproved model deployments, identifies supply chain risks in agents, MCP servers, models, and AI assets, and spots vulnerabilities in agents and models with automated red teaming.
    source: { url: https://onyx.security/platform, tier: official, title: Onyx platform page, accessed: 2026-06-10, origin: reviewed, quote: "Integrates with browser, AI platforms, CNAPP, SASE, and EDR discovery sources so nothing is invisible." }
