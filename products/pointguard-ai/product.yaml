    source: { url: https://www.pointguardai.com/blog/introducing-the-mcp-security-gateway-the-next-generation-of-agentic-security, tier: official, title: Introducing the MCP Security Gateway, accessed: 2026-07-16, origin: agent, quote: "These guardrails detect and block unsafe instructions, preventing agents from executing unintended or harmful actions." }
