  - date: 2026-06-10
    summary: Added to the catalog from the Microsoft Open Source Blog announcement and the project repository; in public preview per the repository README.
  - date: 2026-07-04
    summary: "Corrected matrix_coverage (erratum): narrowed the orchestration row functions and re-anchored the identity and runtime coverage quotes to the repository."
matrix_coverage:
  - asset: ai-orchestration-tools
    functions: [protect, detect, respond]
    maturity: primary
    note: The policy engine evaluates every governed agent tool call against YAML, OPA, or Cedar rules with fail-closed deny and approval workflows; the MCP Security Gateway detects tool poisoning, drift, and hidden instructions, with privilege rings, a kill switch, and Merkle audit logs.
    source: { url: https://github.com/microsoft/agent-governance-toolkit, tier: official, title: Agent Governance Toolkit repository, accessed: 2026-07-04, origin: agent, quote: "safe_tool evaluates your YAML policy on every call, logs the decision, and raises GovernanceDenied if the action is blocked." }
  - asset: ai-agent-identities
    functions: [identify, protect]
    maturity: secondary
    note: The AgentMesh identity layer issues agent credentials over SPIFFE, DID, and mTLS with trust scoring and delegation chains, and Shadow AI Discovery locates unregistered agents across processes, configs, and repositories.
    source: { url: https://github.com/microsoft/agent-governance-toolkit, tier: official, title: Agent Governance Toolkit repository, accessed: 2026-07-04, origin: agent, quote: "Shadow AI Discovery Find unregistered agents across processes, configs, and repos" }
  - asset: runtime-ai-data
    functions: [detect]
    maturity: adjacent
    note: The PromptDefense evaluator and the agt red-team scan command audit prompt files for injection across twelve vectors as an offline check rather than an inline guardrail.
    source: { url: https://github.com/microsoft/agent-governance-toolkit, tier: official, title: Agent Governance Toolkit repository, accessed: 2026-07-04, origin: agent, quote: "PromptDefense Evaluator 12-vector prompt injection audit" }
primary_cell: { asset: ai-orchestration-tools, function: protect }
